<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chat IA</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                    radial-gradient(circle at top left, #7c2d12 0%, transparent 35%),
                    radial-gradient(circle at bottom right, #ea580c 0%, transparent 30%),
                    linear-gradient(135deg, #1c0f08, #3b1f0f);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px;
            color: #fff7ed;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 720px;
            background: rgba(35, 16, 8, 0.9);
            border: 1px solid rgba(255, 180, 120, 0.15);
            border-radius: 22px;
            padding: 28px;
            box-shadow:
                    0 20px 50px rgba(0, 0, 0, 0.35),
                    inset 0 1px 0 rgba(255, 200, 150, 0.06);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 24px 0;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffedd5;
        }

        .seccion-titulo {
            margin: 0 0 14px 0;
            font-size: 18px;
            font-weight: 600;
            color: #fdba74;
        }

        form {
            display: flex;
            gap: 12px;
            margin-bottom: 22px;
        }

        .form-texto {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 22px;
        }

        input,
        textarea,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 180, 120, 0.2);
            background: rgba(255, 150, 80, 0.06);
            color: #fff7ed;
            font-size: 15px;
            transition: 0.2s ease;
            font-family: inherit;
        }

        input::placeholder,
        textarea::placeholder {
            color: #fdba74;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #fb923c;
            background: rgba(255, 150, 80, 0.12);
            box-shadow: 0 0 0 4px rgba(251, 146, 60, 0.15);
        }

        textarea {
            min-height: 160px;
            resize: vertical;
            line-height: 1.6;
        }

        select {
            cursor: pointer;
        }

        select option {
            background: #3b1f0f;
            color: #fff7ed;
        }

        button {
            padding: 14px 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #fb923c, #ea580c);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
            box-shadow: 0 10px 24px rgba(234, 88, 12, 0.35);
            align-self: flex-end;
        }

        button:hover {
            transform: translateY(-1px);
            opacity: 0.96;
        }

        button:active {
            transform: translateY(0);
        }

        .respuesta {
            margin-top: 8px;
            padding: 22px;
            border-radius: 18px;
            background: rgba(255, 150, 80, 0.05);
            border: 1px solid rgba(255, 180, 120, 0.15);
            box-shadow: inset 0 1px 0 rgba(255, 200, 150, 0.05);
            line-height: 1.7;
            animation: aparecer 0.25s ease;
        }

        .respuesta h2 {
            margin: 0 0 14px 0;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #fdba74;
        }

        .respuesta h1,
        .respuesta h3,
        .respuesta h4 {
            color: #fff7ed;
            margin-top: 0;
        }

        .respuesta p {
            color: #ffedd5;
            margin: 10px 0;
        }

        .respuesta ul,
        .respuesta ol {
            margin: 12px 0;
            padding-left: 22px;
            color: #ffedd5;
        }

        .respuesta li {
            margin: 6px 0;
        }

        .respuesta strong {
            color: #ffffff;
        }

        .respuesta em {
            color: #fdba74;
        }

        .respuesta code {
            font-family: Consolas, Monaco, monospace;
            background: rgba(251, 146, 60, 0.15);
            color: #fdba74;
            padding: 3px 7px;
            border-radius: 8px;
            font-size: 0.95em;
        }

        .respuesta pre {
            background: #140c06;
            color: #ffe8cc;
            padding: 14px;
            border-radius: 14px;
            overflow-x: auto;
            border: 1px solid rgba(255, 180, 120, 0.12);
        }

        .respuesta pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        hr {
            border: none;
            height: 1px;
            background: linear-gradient(
                    to right,
                    transparent,
                    rgba(255, 180, 120, 0.35),
                    transparent
            );
            margin: 30px 0;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Pregunta a la IA</h1>

    <form th:action="@{/}" method="get">
        <input
                id="pregunta"
                name="pregunta"
                type="text"
                placeholder="Escribe tu pregunta..."
                th:value="${pregunta}"
                required
        />
        <button type="submit">Enviar</button>
    </form>

    <div class="respuesta" th:if="${respuesta}">
        <h2>Respuesta</h2>
        <div th:utext="${respuesta}"></div>
    </div>

    <hr>

    <h2 class="seccion-titulo">Procesar texto</h2>

    <form class="form-texto" action="/procesar" method="get">
        <textarea
                name="texto"
                placeholder="Escribe un texto para corregir, resumir o traducir..."
                required
                th:text="${texto}"></textarea>

        <select name="accion">
            <option value="corregir" th:selected="${accion == 'corregir'}">Corregir texto</option>
            <option value="resumir" th:selected="${accion == 'resumir'}">Resumir texto</option>
            <option value="traducir" th:selected="${accion == 'traducir'}">Traducir al inglés</option>
        </select>

        <button type="submit">Procesar</button>
    </form>

    <div class="respuesta" th:if="${resultadoTexto}">
        <h2>Resultado</h2>
        <div th:utext="${resultadoTexto}"></div>
    </div>

</div>

</body>
</html>
